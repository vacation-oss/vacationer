<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>2D 건물 부수기 게임</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="container">
      <section class="game-area">
        <canvas id="gameCanvas" width="1000" height="560" aria-label="건물 부수기 게임 캔버스"></canvas>
      </section>

      <aside class="panel">
        <h1>🏗️ 건물 부수기</h1>
        <p class="desc">마우스로 당겨서 포탄을 발사해 건물을 모두 무너뜨리세요!</p>

        <div class="stat-row"><span>남은 탄 수</span><strong id="ammo">0</strong></div>
        <div class="stat-row"><span>점수</span><strong id="score">0</strong></div>
        <div class="stat-row"><span>남은 블록</span><strong id="blocksLeft">0</strong></div>

        <button id="restartBtn">재시작</button>
        <p id="message" class="message">재시작 버튼을 눌러 시작하세요.</p>

        <div class="help">
          <h2>조작법</h2>
          <ul>
            <li>포탄(왼쪽 원)을 마우스로 클릭 후 당기기</li>
            <li>마우스를 놓으면 발사</li>
            <li>모든 블록을 쓰러뜨리면 스테이지 클리어</li>
          </ul>
        </div>
      </aside>
    </main>

    <!-- 2D 물리엔진: Matter.js (CDN) -->
    <script src="https://cdn.jsdelivr.net/npm/matter-js@0.20.0/build/matter.min.js"></script>
    <script src="script.js"></script>
  </body>
</html>
